source = { virtual = "." }
dependencies = [
    { name = "authlib" },
    { name = "bcrypt" },
    { name = "cryptography" },
    { name = "flask" },
    { name = "flask-babel" },
    { name = "flask-limiter" },
    { name = "flask-migrate" },
    { name = "flask-sqlalchemy" },
    { name = "gunicorn" },
    { name = "pillow" },
    { name = "pyjwt" },
    { name = "pyotp" },
    { name = "qrcode" },
    { name = "redis" },
    { name = "secure" },
    { name = "webauthn" },
]

[package.optional-dependencies]
mysql = [
    { name = "pymysql" },
]
postgres = [
    { name = "psycopg2-binary" },
]

[package.dev-dependencies]
dev = [
    { name = "pyjwt" },
    { name = "pytest" },
    { name = "pytest-mock" },
]

