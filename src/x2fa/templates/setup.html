<!DOCTYPE html>
<html lang="{{ get_locale() }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ _("Set up 2FA") }} – X2FA</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 0 1rem; color: #111; }
  h1   { font-size: 1.4rem; margin-bottom: 0.25rem; }
  p    { color: #555; margin-top: 0; }
  button {
    width: 100%; padding: 0.8rem; font-size: 1rem; border: none; border-radius: 6px;
    background: #1a56db; color: white; cursor: pointer; margin-top: 1rem;
  }
  button:disabled { background: #9ab; cursor: not-allowed; }
  #cancel-btn { background: #6b7280; display: none; }
  .error { color: #c00; margin-top: 1rem; display: none; }
  .hint  { font-size: 0.85rem; color: #888; margin-top: 1.5rem; }
</style>
</head>
<body>

<h1 id="title">{{ _("Set up security key") }}</h1>
<p id="desc">{{ _("Use FaceID, TouchID, Windows Hello or a security key.") }}</p>

<button id="btn">{{ _("Set up now") }}</button>
<button id="cancel-btn">{{ _("Cancel") }}</button>
<div class="error" id="err"></div>
<p class="hint">{{ _("Choose a different method?") }} <a href="/setup">{{ _("Back to selection") }}</a></p>

<script nonce="{{ nonce }}">
const OPTIONS      = {{ options_json | safe }};
const CHALLENGE_ID = "{{ challenge_id }}";
const I18N = {
  waiting:  "{{ _('Waiting for authenticator\u2026') }}",
  setup:    "{{ _('Set up now') }}",
  retry:    "{{ _('Try again') }}",
  cancel:   "{{ _('Cancel') }}",
  failed:   "{{ _('Setup failed.') }}",
  platform_title: "{{ _('Set up device as security key') }}",
  platform_desc:  "{{ _('Use FaceID, TouchID or Windows Hello to register this device.') }}",
  roaming_title:  "{{ _('Set up security key') }}",
  roaming_desc:   "{{ _('You can use:') }}\n\u2022 {{ _('Phone') }} \u2013 {{ _('click Set up, choose Smartphone or Tablet in the browser dialog') }}\n\u2022 {{ _('USB key') }} \u2013 {{ _('plug in YubiKey etc. and click') }}",
};

let _abortController = null;

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
function fromB64url(s) {
  const b = atob(s.replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from(b, c => c.charCodeAt(0)).buffer;
}

if (window.PublicKeyCredential && PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) {
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(available => {
    if (available) {
      document.getElementById('title').textContent = I18N.platform_title;
      document.getElementById('desc').textContent  = I18N.platform_desc;
    } else {
      document.getElementById('title').textContent = I18N.roaming_title;
      document.getElementById('desc').innerText    = I18N.roaming_desc;
    }
  });
}

document.getElementById('btn').addEventListener('click', startRegistration);
document.getElementById('cancel-btn').addEventListener('click', cancelRegistration);

function cancelRegistration() {
  if (_abortController) {
    _abortController.abort();
    _abortController = null;
  }
}

async function startRegistration() {
  if (!window.PublicKeyCredential) {
    window.location = "/totp/setup";
    return;
  }
  const btn       = document.getElementById("btn");
  const cancelBtn = document.getElementById("cancel-btn");
  const err       = document.getElementById("err");

  btn.disabled            = true;
  btn.textContent         = I18N.waiting;
  cancelBtn.style.display = "block";
  err.style.display       = "none";

  _abortController = new AbortController();

  try {
    const opts = structuredClone(OPTIONS);
    opts.challenge        = fromB64url(opts.challenge);
    opts.user.id          = fromB64url(opts.user.id);
    if (opts.excludeCredentials) {
      opts.excludeCredentials = opts.excludeCredentials.map(c => ({...c, id: fromB64url(c.id)}));
    }

    const cred = await navigator.credentials.create({
      publicKey: opts,
      signal: _abortController.signal,
    });

    cancelBtn.style.display = "none";

    const payload = {
      challenge_id: CHALLENGE_ID,
      id:     cred.id,
      rawId:  b64url(cred.rawId),
      type:   cred.type,
      transports: cred.response.getTransports ? cred.response.getTransports() : [],
      response: {
        clientDataJSON:    b64url(cred.response.clientDataJSON),
        attestationObject: b64url(cred.response.attestationObject),
      }
    };

    const res = await fetch("/setup/complete", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || I18N.failed);
    window.location = data.redirect_url;

  } catch (e) {
    cancelBtn.style.display = "none";
    _abortController = null;

    if (e.name === "AbortError") {
      btn.disabled    = false;
      btn.textContent = I18N.setup;
      return;
    }

    err.textContent   = e.message || I18N.failed;
    err.style.display = "block";
    btn.disabled      = false;
    btn.textContent   = I18N.retry;
  }
}
</script>
</body>
</html>
