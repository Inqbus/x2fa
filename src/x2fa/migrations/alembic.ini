# Alembic configuration for x2fa.
# The database URL is not set here; env.py reads it from db_config.toml.
# Override with: alembic -x sqlalchemy.url=sqlite:///path/to/db.sqlite upgrade head

[alembic]
script_location = .
prepend_sys_path = .
path_separator = os

# Migration file naming: timestamp_slug.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
