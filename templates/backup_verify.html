<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Backup-Code – X2FA</title>
<style>
  body   { font-family: system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 0 1rem; color: #111; }
  h1     { font-size: 1.4rem; margin-bottom: 0.25rem; }
  p      { color: #555; margin-top: 0; }
  label  { font-size: 0.9rem; font-weight: 600; }
  input  { width: 100%; box-sizing: border-box; padding: 0.7rem; font-size: 1.3rem;
           letter-spacing: 0.25rem; border: 1px solid #ccc; border-radius: 6px;
           margin-top: 0.3rem; text-align: center; text-transform: uppercase; }
  button { width: 100%; padding: 0.8rem; font-size: 1rem; border: none;
           border-radius: 6px; background: #1a56db; color: white;
           cursor: pointer; margin-top: 0.75rem; }
  .error { color: #c00; margin-top: 0.75rem; {% if not error %}display: none;{% endif %} }
  .warn  { background: #fff8e1; border-left: 4px solid #f59e0b;
           padding: 0.75rem 1rem; border-radius: 4px; font-size: 0.9rem;
           margin-bottom: 1.5rem; }
</style>
</head>
<body>

<h1>Backup-Code verwenden</h1>
<div class="warn">
  Jeder Code kann nur einmal verwendet werden.<br>
  Nach dem Login wird ein neues 2FA-Setup erforderlich sein.
</div>

<form method="POST" action="/backup/verify">
  <label for="code">8-stelliger Backup-Code</label>
  <input type="text" id="code" name="code" inputmode="text"
         pattern="[A-Fa-f0-9]{8}" maxlength="8" autocomplete="off"
         placeholder="A1B2C3D4" required>
  <button type="submit">Anmelden</button>
  <div class="error" id="err">{{ error }}</div>
</form>

<script nonce="{{ nonce }}">
  document.getElementById('code').focus();
</script>
</body>
</html>
