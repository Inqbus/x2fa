<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2FA einrichten – X2FA</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 0 1rem; color: #111; }
  h1   { font-size: 1.4rem; margin-bottom: 0.25rem; }
  p    { color: #555; margin-top: 0; }
  button {
    width: 100%; padding: 0.8rem; font-size: 1rem; border: none; border-radius: 6px;
    background: #1a56db; color: white; cursor: pointer; margin-top: 1rem;
  }
  button:disabled { background: #9ab; cursor: not-allowed; }
  #cancel-btn { background: #6b7280; display: none; }
  .error { color: #c00; margin-top: 1rem; display: none; }
  .hint  { font-size: 0.85rem; color: #888; margin-top: 1.5rem; }
</style>
</head>
<body>

<h1 id="title">Sicherheitsschlüssel einrichten</h1>
<p id="desc">Verwende FaceID, TouchID, Windows Hello oder einen Sicherheitsschlüssel.</p>

<button id="btn">Jetzt einrichten</button>
<button id="cancel-btn">Abbrechen</button>
<div class="error" id="err"></div>
<p class="hint">Andere Methode wählen? <a href="/setup">Zurück zur Auswahl</a></p>

<script nonce="{{ nonce }}">
const OPTIONS      = {{ options_json | safe }};
const CHALLENGE_ID = "{{ challenge_id }}";

let _abortController = null;

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
function fromB64url(s) {
  const b = atob(s.replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from(b, c => c.charCodeAt(0)).buffer;
}

if (window.PublicKeyCredential && PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) {
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(available => {
    if (available) {
      document.getElementById('title').textContent = "Gerät als Sicherheitsschlüssel einrichten";
      document.getElementById('desc').textContent = "Verwende FaceID, TouchID oder Windows Hello, um dieses Gerät zu registrieren.";
    } else {
      document.getElementById('title').textContent = "Sicherheitsschlüssel einrichten";
      document.getElementById('desc').innerHTML =
        'Du kannst verwenden:<br>' +
        '&#8226; <b>Handy</b> \u2013 klicke Einrichten, w\u00e4hle im Browser-Dialog <i>Smartphone oder Tablet</i><br>' +
        '&#8226; <b>USB-Schl\u00fcssel</b> \u2013 YubiKey o.\u00e4. einstecken und klicken';
    }
  });
}

document.getElementById('btn').addEventListener('click', startRegistration);
document.getElementById('cancel-btn').addEventListener('click', cancelRegistration);

function cancelRegistration() {
  if (_abortController) {
    _abortController.abort();
    _abortController = null;
  }
}

async function startRegistration() {
  if (!window.PublicKeyCredential) {
    window.location = "/totp/setup";
    return;
  }
  const btn       = document.getElementById("btn");
  const cancelBtn = document.getElementById("cancel-btn");
  const err       = document.getElementById("err");

  btn.disabled          = true;
  btn.textContent       = "Warte auf Authenticator\u2026";
  cancelBtn.style.display = "block";
  err.style.display     = "none";

  _abortController = new AbortController();

  try {
    const opts = structuredClone(OPTIONS);
    opts.challenge        = fromB64url(opts.challenge);
    opts.user.id          = fromB64url(opts.user.id);
    if (opts.excludeCredentials) {
      opts.excludeCredentials = opts.excludeCredentials.map(c => ({...c, id: fromB64url(c.id)}));
    }

    const cred = await navigator.credentials.create({
      publicKey: opts,
      signal: _abortController.signal,
    });

    cancelBtn.style.display = "none";

    const payload = {
      challenge_id: CHALLENGE_ID,
      id:     cred.id,
      rawId:  b64url(cred.rawId),
      type:   cred.type,
      transports: cred.response.getTransports ? cred.response.getTransports() : [],
      response: {
        clientDataJSON:    b64url(cred.response.clientDataJSON),
        attestationObject: b64url(cred.response.attestationObject),
      }
    };

    const res = await fetch("/setup/complete", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Unbekannter Fehler");
    window.location = data.redirect_url;

  } catch (e) {
    cancelBtn.style.display = "none";
    _abortController = null;

    if (e.name === "AbortError") {
      // User cancelled — reset silently
      btn.disabled    = false;
      btn.textContent = "Jetzt einrichten";
      return;
    }

    err.textContent   = e.message || "Einrichtung fehlgeschlagen.";
    err.style.display = "block";
    btn.disabled      = false;
    btn.textContent   = "Erneut versuchen";
  }
}
</script>
</body>
</html>
