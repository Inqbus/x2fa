<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2FA bestätigen – X2FA</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 0 1rem; color: #111; }
  h1   { font-size: 1.4rem; margin-bottom: 0.25rem; }
  p    { color: #555; margin-top: 0; }
  button {
    width: 100%; padding: 0.8rem; font-size: 1rem; border: none; border-radius: 6px;
    background: #1a56db; color: white; cursor: pointer; margin-top: 1rem;
  }
  button:disabled { background: #9ab; cursor: not-allowed; }
  .error { color: #c00; margin-top: 1rem; display: none; }
  .hint  { font-size: 0.85rem; color: #888; margin-top: 1.5rem; }
  .links { display: flex; gap: 1rem; flex-wrap: wrap; }
</style>
</head>
<body>

<h1>Identität bestätigen</h1>
<p>Verwende FaceID, TouchID, Windows Hello oder einen Sicherheitsschlüssel.</p>

<button id="btn">Bestätigen</button>
<div class="error" id="err"></div>
<p class="hint">Probleme?
  <span class="links">
    <a href="/totp/verify?token={{token}}">TOTP-Code eingeben</a>
    <a href="/backup/verify?token={{token}}">Backup-Code verwenden</a>
  </span>
</p>

<script nonce="{{nonce}}">
const TOKEN       = "{{token}}";
const OPTIONS     = {{!options_json}};
const CHALLENGE_ID = "{{challenge_id}}";

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
function fromB64url(s) {
  const b = atob(s.replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from(b, c => c.charCodeAt(0)).buffer;
}

// Auto-Fallback: kein WebAuthn → sofort zu TOTP
if (!window.PublicKeyCredential) {
  window.location = "/totp/verify?token=" + TOKEN;
}

document.getElementById('btn').addEventListener('click', startAuthentication);

async function startAuthentication() {
  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "Warte auf Authenticator…";

  try {
    const opts = structuredClone(OPTIONS);
    opts.challenge = fromB64url(opts.challenge);
    if (opts.allowCredentials) {
      opts.allowCredentials = opts.allowCredentials.map(c => ({...c, id: fromB64url(c.id)}));
    }

    const cred = await navigator.credentials.get({ publicKey: opts });

    const payload = {
      token: TOKEN,
      challenge_id: CHALLENGE_ID,
      id: cred.id,
      rawId: b64url(cred.rawId),
      type: cred.type,
      response: {
        clientDataJSON:    b64url(cred.response.clientDataJSON),
        authenticatorData: b64url(cred.response.authenticatorData),
        signature:         b64url(cred.response.signature),
        userHandle: cred.response.userHandle ? b64url(cred.response.userHandle) : null,
      }
    };

    const res = await fetch("/verify/complete", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Unbekannter Fehler");
    window.location = data.redirect_url;

  } catch (e) {
    const err = document.getElementById("err");
    err.textContent = e.message || "Bestätigung fehlgeschlagen.";
    err.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Erneut versuchen";
  }
}
</script>
</body>
</html>
