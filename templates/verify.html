<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2FA bestätigen – X2FA</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 0 1rem; color: #111; }
  h1   { font-size: 1.4rem; margin-bottom: 0.25rem; }
  p    { color: #555; margin-top: 0; }
  button {
    width: 100%; padding: 0.8rem; font-size: 1rem; border: none; border-radius: 6px;
    background: #1a56db; color: white; cursor: pointer; margin-top: 1rem;
  }
  button:disabled { background: #9ab; cursor: not-allowed; }
  #cancel-btn { background: #6b7280; display: none; }
  .error { color: #c00; margin-top: 1rem; display: none; }
  .hint  { font-size: 0.85rem; color: #888; margin-top: 1.5rem; }
  .links { display: flex; gap: 1rem; flex-wrap: wrap; }
</style>
</head>
<body>

<h1 id="title">Identität bestätigen</h1>
<p id="desc">Verwende FaceID, TouchID, Windows Hello oder einen Sicherheitsschlüssel.</p>

<button id="btn">Bestätigen</button>
<button id="cancel-btn">Abbrechen</button>
<div class="error" id="err"></div>
<p class="hint">Probleme?
  <span class="links">
    <a href="/totp/verify">TOTP-Code eingeben</a>
    <a href="/backup/verify">Backup-Code verwenden</a>
  </span>
</p>

<script nonce="{{ nonce }}">
const OPTIONS      = {{ options_json | safe }};
const CHALLENGE_ID = "{{ challenge_id }}";

let _abortController = null;

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
function fromB64url(s) {
  const b = atob(s.replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from(b, c => c.charCodeAt(0)).buffer;
}

if (!window.PublicKeyCredential) {
  window.location = "/totp/verify";
}

if (window.PublicKeyCredential && PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) {
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(available => {
    if (available) {
      document.getElementById('title').textContent = "Mit Gerät bestätigen";
      document.getElementById('desc').textContent = "Bestätige deine Identität mit FaceID, TouchID oder Windows Hello.";
    } else {
      document.getElementById('title').textContent = "Identität bestätigen";
      document.getElementById('desc').innerHTML =
        'Best\u00e4tige mit dem Ger\u00e4t, das du beim Einrichten verwendet hast:<br>' +
        '&#8226; <b>Handy</b> \u2013 klicke Best\u00e4tigen, w\u00e4hle <i>Smartphone oder Tablet</i><br>' +
        '&#8226; <b>USB-Schl\u00fcssel</b> \u2013 YubiKey o.\u00e4. einstecken und klicken';
    }
  });
}

document.getElementById('btn').addEventListener('click', startAuthentication);
document.getElementById('cancel-btn').addEventListener('click', cancelAuthentication);

function cancelAuthentication() {
  if (_abortController) {
    _abortController.abort();
    _abortController = null;
  }
}

async function startAuthentication() {
  const btn       = document.getElementById("btn");
  const cancelBtn = document.getElementById("cancel-btn");
  const err       = document.getElementById("err");

  btn.disabled          = true;
  btn.textContent       = "Warte auf Authenticator\u2026";
  cancelBtn.style.display = "block";
  err.style.display     = "none";

  _abortController = new AbortController();

  try {
    const opts = structuredClone(OPTIONS);
    opts.challenge = fromB64url(opts.challenge);
    if (opts.allowCredentials) {
      opts.allowCredentials = opts.allowCredentials.map(c => ({...c, id: fromB64url(c.id)}));
    }

    const cred = await navigator.credentials.get({
      publicKey: opts,
      signal: _abortController.signal,
    });

    cancelBtn.style.display = "none";

    const payload = {
      challenge_id: CHALLENGE_ID,
      id:     cred.id,
      rawId:  b64url(cred.rawId),
      type:   cred.type,
      response: {
        clientDataJSON:    b64url(cred.response.clientDataJSON),
        authenticatorData: b64url(cred.response.authenticatorData),
        signature:         b64url(cred.response.signature),
        userHandle: cred.response.userHandle ? b64url(cred.response.userHandle) : null,
      }
    };

    const res = await fetch("/verify/complete", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Unbekannter Fehler");
    window.location = data.redirect_url;

  } catch (e) {
    cancelBtn.style.display = "none";
    _abortController = null;

    if (e.name === "AbortError") {
      // User cancelled — reset silently
      btn.disabled    = false;
      btn.textContent = "Bestätigen";
      return;
    }

    err.textContent   = e.message || "Bestätigung fehlgeschlagen.";
    err.style.display = "block";
    btn.disabled      = false;
    btn.textContent   = "Erneut versuchen";
  }
}
</script>
</body>
</html>
