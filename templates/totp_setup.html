<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOTP einrichten – X2FA</title>
<style>
  body    { font-family: system-ui, sans-serif; max-width: 460px; margin: 60px auto; padding: 0 1rem; color: #111; }
  h1      { font-size: 1.4rem; margin-bottom: 0.25rem; }
  p       { color: #555; margin-top: 0; }
  .qr     { text-align: center; margin: 1.5rem 0; }
  .qr img { border: 4px solid #eee; border-radius: 8px; }
  .secret { font-family: monospace; font-size: 1rem; background: #f4f4f4;
            padding: 0.5rem 0.75rem; border-radius: 4px; word-break: break-all;
            margin: 0.5rem 0 1.5rem; }
  label   { font-size: 0.9rem; font-weight: 600; }
  input   { width: 100%; box-sizing: border-box; padding: 0.7rem; font-size: 1.2rem;
            letter-spacing: 0.3rem; border: 1px solid #ccc; border-radius: 6px;
            margin-top: 0.3rem; text-align: center; }
  button  { width: 100%; padding: 0.8rem; font-size: 1rem; border: none;
            border-radius: 6px; background: #1a56db; color: white;
            cursor: pointer; margin-top: 0.75rem; }
  button:disabled { background: #9ab; cursor: not-allowed; }
  .error  { color: #c00; margin-top: 0.75rem; display: none; }
  .step   { font-size: 0.85rem; color: #666; margin-bottom: 0.25rem; }
</style>
</head>
<body>

<h1>Authenticator-App einrichten</h1>
<p>Scanne den QR-Code mit Google Authenticator, Aegis oder einer anderen TOTP-App.</p>

<p class="step"><strong>Schritt 1:</strong> QR-Code scannen</p>
<div class="qr">
  <img src="{{qr_data_uri}}" alt="TOTP QR-Code" width="200" height="200">
</div>

<p class="step"><strong>Schritt 2:</strong> Oder Secret manuell eingeben</p>
<div class="secret">{{secret}}</div>

<p class="step"><strong>Schritt 3:</strong> 6-stelligen Code aus der App eingeben</p>
<form method="POST" action="/totp/setup/verify">
  <input type="hidden" name="token" value="{{token}}">
  <label for="code">Bestätigungscode</label>
  <input type="text" id="code" name="code" inputmode="numeric"
         pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code"
         placeholder="000000" required>
  <button type="submit">Einrichtung abschließen</button>
  <div class="error" id="err">{{error}}</div>
</form>

<script nonce="{{nonce}}">
  // Fehler aus Query-String anzeigen
  const err = document.getElementById('err');
  if ("{{error}}" !== "") {
    err.style.display = "block";
  }
  // Code-Feld automatisch fokussieren
  document.getElementById('code').focus();
</script>
</body>
</html>
