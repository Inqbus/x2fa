<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2FA einrichten – X2FA</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 440px; margin: 80px auto; padding: 0 1rem; color: #111; }
  h1   { font-size: 1.4rem; margin-bottom: 0.25rem; }
  p    { color: #555; margin-top: 0; }
  .methods { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
  .method {
    display: block; padding: 1.1rem 1.2rem; border: 2px solid #d0d7de; border-radius: 8px;
    text-decoration: none; color: #111; cursor: pointer; transition: border-color .15s, background .15s;
  }
  .method:hover { border-color: #1a56db; background: #f0f5ff; }
  .method-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.2rem; }
  .method-desc  { font-size: 0.85rem; color: #555; }
</style>
</head>
<body>

<h1>Zwei-Faktor-Authentifizierung einrichten</h1>
<p>Wähle die Methode, die du verwenden möchtest.</p>

<div class="methods">
  <a class="method" href="/setup/webauthn">
    <div class="method-title">Passkey oder Sicherheitsschlüssel</div>
    <div class="method-desc">Handy, YubiKey, Windows Hello, FaceID, TouchID</div>
  </a>
  <a class="method" href="/totp/setup">
    <div class="method-title">Authenticator-App (TOTP)</div>
    <div class="method-desc">Google Authenticator, Authy, FreeOTP u.a.</div>
  </a>
</div>

</body>
</html>
