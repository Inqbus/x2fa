[project]
name = "x2fa"
version = "0.1.0"
description = "Zero-Hardware FIDO2 Microservice mit TOTP-Fallback"
requires-python = ">=3.11"
dependencies = [
    "webauthn>=2.0.0",
    "pyotp>=2.9.0",
    "qrcode>=7.4",
    "Pillow>=10.0.0",
    "pyjwt>=2.8.0",
    "cryptography>=41.0.0",
    "sqlalchemy>=2.0.0",
    "bcrypt>=4.0.0",
]

[project.optional-dependencies]
postgres = ["psycopg2-binary>=2.9.0"]
mysql = ["pymysql>=1.1.0"]
migrations = ["alembic>=1.12.0"]

[project.scripts]
x2fa = "start:main"

[dependency-groups]
dev = []
